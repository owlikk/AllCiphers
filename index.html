<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Cipher App</h1>

        <label for="cipher">Choose cipher:</label>
        <select id="cipher" onchange="toggleFields()">
            <option value="caesar">Caesar cipher</option>
            <option value="ascii">ASCII</option>
            <option value="koi8">KOI8</option>
            <option value="morse">Morse code</option>
            <option value="vigenere">Vigenere cipher</option>
            <option value="bacon">Bacon cipher</option>
            <option value="atbash">Atbash cipher</option>
            <option value="gronsfeld">Gronsfeld cipher</option>
            <option value="polybius">Polybius square</option>
            <option value="playfair">Playfair cipher</option>
        </select>

        <label for="text">Enter text:</label>
        <textarea id="text" placeholder="Enter text here"></textarea>

        <div id="shift-group">
            <label for="shift">Enter shift:</label>
            <input type="number" id="shift" value="3">
        </div>

        <div id="key-group" style="display: none;">
            <label for="key">Enter key:</label>
            <input type="text" id="key" placeholder="Enter key">
        </div>

        <button type="button" onclick="encrypt()">Encrypt</button>

        <h2>Result:</h2>
        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
